services:
  - type: web
    name: miling-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -c gunicorn.conf.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: miling-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
    region: singapore
    repo: https://github.com/zhu6182/miling-h5.git
    rootDir: backend

  - type: web
    name: miling-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "18.17.0"
    region: singapore
    repo: https://github.com/zhu6182/miling-h5.git
    rootDir: web

databases:
  - name: miling-db
    plan: free
    region: singapore